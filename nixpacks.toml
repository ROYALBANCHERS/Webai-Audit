[phases.setup]
nixPkgs = ["php82", "php82Packages.composer"]

[phases.build]
cmds = [
    "cd backend && composer install --no-dev --optimize-autoloader",
    "cd backend && php artisan key:generate"
]

[start]
cmd = "cd backend && php artisan serve --host=0.0.0.0 --port=$PORT"

[variables]
PORT = "8000"
APP_ENV = "production"
APP_DEBUG = "false"
