<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Government Jobs - WebAI Auditor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .job-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .category-badge {
            transition: all 0.2s;
        }
        .category-badge:hover {
            transform: scale(1.05);
        }
        .expiring-soon {
            border-left: 4px solid #ef4444;
        }
        .new-job {
            border-left: 4px solid #10b981;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html" class="flex items-center">
                        <i class="fas fa-search text-2xl text-purple-600 mr-2"></i>
                        <span class="text-xl font-bold text-gray-900">WebAI Auditor</span>
                    </a>
                    <div class="ml-10 flex items-baseline space-x-4">
                        <a href="index.html" class="text-gray-600 hover:text-purple-600 px-3 py-2">Home</a>
                        <a href="gov-jobs.html" class="bg-purple-600 text-white px-3 py-2 rounded-md">Gov Jobs</a>
                    </div>
                </div>
                <div class="flex items-center">
                    <a href="index.html" class="text-purple-600 font-medium">Use Unified Analyzer</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="gradient-bg text-white py-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center">
                <h1 class="text-4xl md:text-5xl font-bold mb-4">
                    <i class="fas fa-briefcase mr-3"></i>Government Jobs
                </h1>
                <p class="text-xl mb-8">Real-time updates from SSC, UPSC, Banking, Railway & more</p>

                <!-- Search Bar -->
                <div class="max-w-3xl mx-auto">
                    <div class="bg-white rounded-lg shadow-lg p-2 flex items-center">
                        <i class="fas fa-search text-gray-400 ml-3"></i>
                        <input
                            type="text"
                            id="searchInput"
                            placeholder="Search for SSC, Banking, Railway, UPSC jobs..."
                            class="flex-1 px-4 py-3 text-gray-700 focus:outline-none"
                            onkeypress="if(event.key === 'Enter') searchJobs()"
                        >
                        <button
                            onclick="searchJobs()"
                            class="bg-purple-600 text-white px-6 py-3 rounded-md hover:bg-purple-700"
                        >
                            Search
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Statistics Bar -->
    <div class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="statsContainer">
                <div class="text-center">
                    <div class="text-3xl font-bold text-purple-600" id="totalJobs">-</div>
                    <div class="text-sm text-gray-600">Total Jobs</div>
                </div>
                <div class="text-center">
                    <div class="text-3xl font-bold text-green-600" id="jobsToday">-</div>
                    <div class="text-sm text-gray-600">Notices</div>
                </div>
                <div class="text-center">
                    <div class="text-3xl font-bold text-red-600" id="expiringSoon">-</div>
                    <div class="text-sm text-gray-600">Exam Updates</div>
                </div>
                <div class="text-center">
                    <div class="text-3xl font-bold text-blue-600" id="thisWeek">-</div>
                    <div class="text-sm text-gray-600">Calendar Events</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex flex-col lg:flex-row gap-8">
            <!-- Filters Sidebar -->
            <div class="lg:w-1/4">
                <div class="bg-white rounded-lg shadow-sm p-6 sticky top-20">
                    <h3 class="text-lg font-semibold mb-4">
                        <i class="fas fa-filter mr-2 text-purple-600"></i>Filters
                    </h3>

                    <!-- Categories -->
                    <div class="mb-6">
                        <h4 class="font-medium text-gray-700 mb-2">Category</h4>
                        <div id="categoriesContainer" class="space-y-2">
                            <div class="loader mx-auto"></div>
                        </div>
                    </div>

                    <button onclick="loadJobs()" class="w-full bg-purple-600 text-white py-2 rounded-md hover:bg-purple-700">
                        <i class="fas fa-sync-alt mr-2"></i>Refresh Jobs
                    </button>
                </div>
            </div>

            <!-- Jobs List -->
            <div class="lg:w-3/4">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-900">
                        Latest Government Jobs
                    </h2>
                </div>

                <!-- Loading Indicator -->
                <div id="loadingIndicator" class="flex justify-center items-center py-12">
                    <div class="loader"></div>
                </div>

                <!-- Jobs Container -->
                <div id="jobsContainer" class="space-y-4">
                    <!-- Jobs will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white py-12 mt-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="border-t border-gray-800 mt-8 pt-8 text-center text-gray-400">
                <p>&copy; 2024 WebAI Auditor. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        let allJobs = [];
        let filteredJobs = [];

        // Categories
        const categories = [
            { id: 'ssc', name: 'SSC', icon: 'fas fa-building' },
            { id: 'upsc', name: 'UPSC', icon: 'fas fa-landmark' },
            { id: 'ibps', name: 'Banking', icon: 'fas fa-university' },
            { id: 'railway', name: 'Railway', icon: 'fas fa-train' }
        ];

        // Load initial data
        document.addEventListener('DOMContentLoaded', function() {
            loadCategories();
            loadJobs();
        });

        // Load categories
        function loadCategories() {
            const container = document.getElementById('categoriesContainer');
            container.innerHTML = '';

            categories.forEach(cat => {
                const div = document.createElement('div');
                div.className = 'flex items-center';
                div.innerHTML = `
                    <label class="flex items-center cursor-pointer">
                        <input type="checkbox" value="${cat.id}" onchange="applyFilters()" class="mr-2">
                        <span class="text-sm"><i class="${cat.icon} mr-1"></i>${cat.name}</span>
                    </label>
                `;
                container.appendChild(div);
            });
        }

        // Load jobs - using direct government APIs
        async function loadJobs() {
            const loadingIndicator = document.getElementById('loadingIndicator');
            const jobsContainer = document.getElementById('jobsContainer');

            loadingIndicator.style.display = 'flex';
            jobsContainer.innerHTML = '';

            allJobs = [];

            try {
                // Fetch SSC Notices
                const noticeRes = await fetch('https://ssc.gov.in/api/general-website/portal/notice-boards?page=1&limit=50&contentType=notice-boards&key=createdAt&order=DESC&attributes=id,headline,createdAt,redirectUrl');
                if (noticeRes.ok) {
                    const noticeData = await noticeRes.json();
                    if (noticeData.statusCode === '200') {
                        allJobs = allJobs.concat((noticeData.data || []).map(item => ({
                            title: item.headline || 'SSC Notice',
                            description: 'Staff Selection Commission',
                            category: 'ssc',
                            department: 'SSC',
                            last_date_to_apply: item.createdAt || null,
                            source_url: item.redirectUrl || 'https://ssc.gov.in',
                            createdAt: item.createdAt
                        })));
                    }
                }

                // Fetch SSC Exam Updates
                const examRes = await fetch('https://ssc.gov.in/api/general-website/portal/records?page=1&limit=50&contentType=browse-exam&key=createdAt&order=DESC&attributes=id,headline,examId,contentType,startDate,endDate,language,createdAt');
                if (examRes.ok) {
                    const examData = await examRes.json();
                    if (examData.statusCode === '200') {
                        allJobs = allJobs.concat((examData.data || []).map(item => ({
                            title: item.headline || 'SSC Exam Update',
                            description: item.contentType || 'SSC Examination',
                            category: 'ssc',
                            department: 'SSC',
                            last_date_to_apply: item.startDate || null,
                            source_url: 'https://ssc.gov.in',
                            createdAt: item.createdAt
                        })));
                    }
                }

                // Update statistics
                updateStatistics();

                // Display jobs
                filteredJobs = [...allJobs];
                displayJobs(filteredJobs);

            } catch (error) {
                console.error('Failed to load jobs:', error);
                jobsContainer.innerHTML = `
                    <div class="text-center py-12">
                        <i class="fas fa-exclamation-circle text-red-500 text-4xl mb-4"></i>
                        <p class="text-gray-600 mb-4">Unable to connect to government servers.</p>
                        <button onclick="loadJobs()" class="bg-purple-600 text-white px-6 py-2 rounded-md hover:bg-purple-700">
                            <i class="fas fa-redo mr-2"></i>Retry
                        </button>
                    </div>
                `;
            } finally {
                loadingIndicator.style.display = 'none';
            }
        }

        // Update statistics
        function updateStatistics() {
            document.getElementById('totalJobs').textContent = allJobs.length;
            document.getElementById('jobsToday').textContent = allJobs.filter(j => j.category === 'ssc').length;
            document.getElementById('expiringSoon').textContent = allJobs.filter(j => j.description.includes('Examination')).length;
            document.getElementById('thisWeek').textContent = allJobs.length > 0 ? Math.min(50, allJobs.length) : 0;
        }

        // Display jobs
        function displayJobs(jobs) {
            const container = document.getElementById('jobsContainer');

            if (jobs.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <i class="fas fa-search text-gray-400 text-4xl mb-4"></i>
                        <p class="text-gray-600">No jobs found matching your criteria.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = '';
            jobs.slice(0, 50).forEach(job => {
                const card = document.createElement('div');
                card.className = `bg-white rounded-lg shadow-sm p-6 job-card transition-all duration-200 new-job`;

                const catInfo = categories.find(c => c.id === job.category) || { name: job.category, icon: 'fas fa-briefcase' };
                const dateStr = job.last_date_to_apply ? new Date(job.last_date_to_apply).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) : 'N/A';

                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-2">
                                <span class="category-badge bg-purple-100 text-purple-700 px-3 py-1 rounded-full text-xs font-medium">
                                    <i class="${catInfo.icon} mr-1"></i>${catInfo.name}
                                </span>
                                ${job.department ? `<span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs">${job.department}</span>` : ''}
                            </div>
                            <h3 class="text-lg font-semibold text-gray-900 mb-2">${job.title}</h3>
                            <p class="text-gray-600 text-sm mb-3">${job.description}</p>
                            <div class="flex items-center gap-4 text-sm text-gray-500">
                                <span><i class="fas fa-calendar mr-1"></i>${dateStr}</span>
                            </div>
                        </div>
                        <div class="ml-4">
                            <a href="${job.source_url}" target="_blank" class="bg-purple-600 text-white px-4 py-2 rounded-md text-sm hover:bg-purple-700">
                                View <i class="fas fa-external-link-alt ml-1"></i>
                            </a>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Search jobs
        function searchJobs() {
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            applyFilters(keyword);
        }

        // Apply filters
        function applyFilters(searchKeyword = null) {
            const keyword = searchKeyword !== null ? searchKeyword : document.getElementById('searchInput').value.trim().toLowerCase();
            const checkedCategories = Array.from(document.querySelectorAll('#categoriesContainer input:checked')).map(cb => cb.value);

            filteredJobs = allJobs.filter(job => {
                const matchesKeyword = !keyword ||
                    job.title.toLowerCase().includes(keyword) ||
                    job.description.toLowerCase().includes(keyword);
                const matchesCategory = checkedCategories.length === 0 || checkedCategories.includes(job.category);
                return matchesKeyword && matchesCategory;
            });

            displayJobs(filteredJobs);
        }

        // Format date
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
        }
    </script>
</body>
</html>
